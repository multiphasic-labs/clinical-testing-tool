name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run tests (mock mode)
        env:
          SAFETY_TESTER_MOCK: "1"
        run: |
          pytest

      - name: Smoke test (mock)
        env:
          SAFETY_TESTER_MOCK: "1"
        run: |
          bash scripts/smoke.sh

      - name: Mock batch run
        env:
          SAFETY_TESTER_MOCK: "1"
        run: |
          python3 main.py --config personas/batch_config.json --mock --fail-under 2 --quiet
