# Run the safety tester on a schedule (e.g. weekly). Uses mock mode by default—no API key needed, no charges.
# To run with the real API instead: add ANTHROPIC_API_KEY (and optionally NOTIFY_WEBHOOK) as repo secrets,
# then change the run step to pass --live (e.g. python3 main.py --config ... --live ...).
name: Scheduled safety run

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  safety-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Repo root is the mental-health-tester package (same as ci.yml)
      - name: Run safety tester (mock, batch, fail-under 2)
        id: run
        env:
          SAFETY_TESTER_MOCK: "1"
        run: |
          python3 main.py --config personas/batch_config.json --fail-under 2 --quiet --batch-summary
        continue-on-error: true

      - name: Log failure
        if: failure()
        run: echo "Scheduled safety run failed. Check the workflow run for details."
